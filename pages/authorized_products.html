<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理产品 - 源合汇通</title>
    <meta name="description" content="源合汇通代理的 VLSI 音频芯片及相关配套产品列表。">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/products.css">
</head>
<body>

    <!-- Global Navigation -->
    <nav class="global-nav">
        <div class="nav-content">
            <a href="../index.html" class="nav-logo">
                <img src="../yeshere_icon.png" alt="YesHere Logo">
                <span>源合汇通</span>
            </a>
            <div class="nav-links">
                <a href="../index.html#about">关于我们</a>
                <a href="authorized_products.html">代理产品</a>
                <a href="distributed_products.html">分销产品</a>
                <a href="../index.html#vlsi">VLSI 代理</a>
                <a href="../index.html#contact">联系我们</a>
            </div>
        </div>
    </nav>

    <main style="padding-top: var(--nav-height);">
        <!-- Hero Section -->
        <section class="products-hero">
            <div class="section-container">
                <h1 class="animate-fade-in" style="font-size: 3rem; font-weight: 700;">代理产品</h1>
                <p class="animate-fade-in" style="color: var(--color-text-secondary); margin-top: 10px;">VLSI 音频芯片及创新解决方案</p>
                
                <div class="search-container animate-fade-in" style="animation-delay: 0.2s;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="productSearch" class="search-input" placeholder="搜索芯片型号或产品名称...">
                </div>
            </div>
        </section>

        <!-- Product List -->
        <section class="product-list-container">
            <div id="productList">
                <!-- Product Items will be injected by JS -->
            </div>

            <div id="noResults" class="no-results">
                <p>没有找到匹配的产品</p>
            </div>
        </section>
    </main>

    <!-- Global Footer -->
    <footer class="global-footer">
        <div class="footer-content">
            <div class="footer-top">
                <p>深圳市源合汇通科技有限公司 (YesHere Technology Limited) | 专注于音频产品供应与 VLSI 授权代理</p>
            </div>
            <div class="footer-bottom">
                <p>© 2026 深圳市源合汇通科技有限公司. 版权所有.</p>
                <div class="footer-legal">
                    <a href="https://beian.miit.gov.cn/" target="_blank">粤ICP备17047300号</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../js/products_data.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productList = document.getElementById('productList');
            const searchInput = document.getElementById('productSearch');
            const noResults = document.getElementById('noResults');

            function renderProducts(data) {
                productList.innerHTML = data.map(product => {
                    const primaryImage = `../Distributed_Products/${product.folder}/${product.images[0]}`;
                    // Extract a short preview from description
                    const preview = product.description 
                        ? product.description.substring(0, 100).replace(/\n/g, ' ') + '...' 
                        : '点击查看详细参数及数据手册。';

                    return `
                        <a href="product_detail.html?id=${product.id}" class="product-list-item reveal" data-name="${product.name}">
                            <div class="product-image-wrapper">
                                <img src="${primaryImage}" alt="${product.name}">
                            </div>
                            <div class="product-info">
                                <h3 class="product-name">${product.name}</h3>
                                <p class="product-description">${preview}</p>
                                ${product.packages.length > 0 ? `<div style="margin-top: 8px;">${product.packages.map(p => `<span class="package-tag">${p}</span>`).join('')}</div>` : ''}
                            </div>
                        </a>
                    `;
                }).join('');
                
                // Re-initialize reveal observer for new elements
                if (window.initReveal) window.initReveal();
            }

            renderProducts(productsData);

            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                const filtered = productsData.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) || 
                    (p.description && p.description.toLowerCase().includes(searchTerm))
                );

                renderProducts(filtered);
                noResults.style.display = filtered.length > 0 ? 'none' : 'block';
            });
        });
    </script>
</body>
</html>
